name: Nightly crawl

on:
  schedule:
    - cron: "17 3 * * *" # 03:17 UTC daily
  workflow_dispatch: {}

permissions:
  contents: write
  pull-requests: write

jobs:
  crawl:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Run crawler
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: pnpm --filter @appblueprints/crawler crawl

      - name: Open PR if there are candidates
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          branch: crawler/nightly-${{ github.run_id }}
          commit-message: "chore(crawler): nightly candidates"
          title: "chore(crawler): nightly candidates"
          body: |
            Auto-generated by `.github/workflows/crawler.yml`.

            Review the YAML under `crawler/out/`, then move accepted entries
            into `data/mcps/` or `data/skills/`.
          add-paths: |
            crawler/out/**
