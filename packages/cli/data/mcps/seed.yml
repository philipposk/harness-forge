- id: github
  name: GitHub
  description: Repo, issue, PR, and Actions access via the GitHub API.
  sourceUrl: https://github.com/github/github-mcp-server
  transport: http
  auth: oauth
  tags: [git, vcs, github]
  stacks: [react-node, nextjs-prisma, fastapi-postgres, rust-cli, mobile-expo]
  recommended: true
  configSnippet: |
    {
      "github": {
        "type": "http",
        "url": "https://api.githubcopilot.com/mcp/"
      }
    }

- id: filesystem
  name: Filesystem
  description: Read, write, and search files within a configured root directory.
  sourceUrl: https://github.com/modelcontextprotocol/servers/tree/main/src/filesystem
  transport: stdio
  auth: none
  tags: [files, local]
  stacks: [react-node, nextjs-prisma, fastapi-postgres, rust-cli, mobile-expo]
  recommended: true
  configSnippet: |
    {
      "filesystem": {
        "command": "npx",
        "args": ["-y", "@modelcontextprotocol/server-filesystem", "/path/to/allowed/dir"]
      }
    }

